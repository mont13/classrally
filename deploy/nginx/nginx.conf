# ClassRally — nginx reverse proxy configuration
#
# Prerequisites:
#   1. Install certbot and the nginx plugin:
#        apt install certbot python3-certbot-nginx
#   2. Obtain a certificate:
#        certbot --nginx -d classrally.example.com
#      Certbot will fill in the ssl_certificate paths automatically and add
#      a renewal cron/timer. The paths below match what certbot generates.
#   3. Replace "classrally.example.com" with your actual domain.
#   4. Copy this file to /etc/nginx/sites-available/classrally and symlink:
#        ln -s /etc/nginx/sites-available/classrally /etc/nginx/sites-enabled/
#        nginx -t && systemctl reload nginx

# Define the upstream ClassRally server.
# Change the address if ClassRally runs somewhere other than localhost:8765.
upstream classrally {
    server 127.0.0.1:8765;
    keepalive 32;
}

# --- HTTP: redirect everything to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name classrally.example.com;

    # Let certbot's ACME challenge through before redirecting.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: main server block ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name classrally.example.com;

    # --- TLS certificates (filled in by certbot, or set manually) ---
    ssl_certificate     /etc/letsencrypt/live/classrally.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/classrally.example.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/classrally.example.com/chain.pem;

    # Modern TLS settings (nginx 1.24+)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        image/svg+xml;

    # --- Static file caching ---
    # Immutable assets served directly through the proxy get long-lived headers.
    location /static/ {
        proxy_pass http://classrally;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Cache for one week; treat as immutable to skip revalidation.
        add_header Cache-Control "public, max-age=604800, immutable";
        expires 7d;
    }

    # --- WebSocket endpoint ---
    # ClassRally uses WebSockets on /ws for real-time quiz state.
    location /ws {
        proxy_pass http://classrally;

        # Required WebSocket upgrade headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward real client IP for rate-limiting
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Host              $host;

        # Keep WebSocket connections alive; no read timeout
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- All other requests ---
    location / {
        proxy_pass http://classrally;

        proxy_http_version 1.1;
        # Clear Connection header for keep-alive upstream
        proxy_set_header Connection "";

        # Forward real client IP so server-side rate-limiting works correctly
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Host              $host;

        # Reasonable timeouts for API calls (AI question generation can be slow)
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Allow larger uploads for audio files
        client_max_body_size 64m;

        # Dynamic content — revalidate after one hour
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }
}
